<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성과관리 역량 시뮬레이션</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0e6d3;
    --bg-deep: #e8d9c0;
    --panel: #faf4e8;
    --border: #c8a87a;
    --border-light: #ddc99a;
    --red: #8b1f30;
    --red-bg: #f5eaec;
    --gold: #b5821e;
    --gold-bg: #fdf6e3;
    --text: #1a1208;
    --text-mid: #3d2e1a;
    --text-soft: #6b5030;
    --hint-bg: #fffbf0;
    --hint-border: #c9a84c;
    --chat-bg: #fdf8f0;
    --user-bg: #f9f0f2;
    --user-border: #d4a0aa;
    --hongdo-bg: #f0f7f0;
    --hongdo-border: #8ab88a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif KR', serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 20%, rgba(200,168,122,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 60% 70% at 85% 80%, rgba(180,140,90,0.15) 0%, transparent 55%),
      var(--bg);
    z-index: 0;
  }

  /* 왼쪽 장식선 */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 6px; height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      #8b1f30 0px, #8b1f30 60px,
      #a83245 60px, #a83245 62px,
      #8b1f30 62px, #8b1f30 120px
    );
    z-index: 1;
  }

  .wrapper {
    position: relative; z-index: 2;
    width: 100%; max-width: 820px;
    padding: 24px 24px 48px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ─── HEADER ─── */
  .header {
    text-align: center;
    padding: 36px 20px 28px;
  }
  .header-badge {
    display: inline-block;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--red);
    border: 1.5px solid var(--red);
    padding: 5px 18px;
    margin-bottom: 18px;
    opacity: 0.85;
  }
  .header h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: -0.5px;
  }
  .header h1 em {
    color: var(--red);
    font-style: normal;
  }
  .header-sub {
    margin-top: 10px;
    font-size: 15px;
    color: var(--text-soft);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .header-divider {
    margin: 20px auto 0;
    width: 140px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  /* ─── SCENARIO PANEL ─── */
  .scenario-panel {
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 0;
    margin-bottom: 20px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(139,31,48,0.1);
  }

  .scenario-header {
    background: var(--red);
    padding: 13px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .scenario-header .icon { font-size: 18px; }
  .scenario-header span {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
  }
  .scenario-header .competency-tag {
    margin-left: auto;
    font-size: 12px;
    background: rgba(255,255,255,0.2);
    color: #fff;
    padding: 3px 12px;
    border: 1px solid rgba(255,255,255,0.4);
    font-weight: 500;
    letter-spacing: 1px;
    border-radius: 2px;
  }

  .scenario-body { padding: 22px 26px 18px; }

  .section-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .scenario-situation {
    font-size: 15px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    line-height: 1.9;
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1.5px dashed var(--border-light);
    word-break: keep-all;
  }
  .scenario-situation strong {
    color: var(--red);
    font-weight: 700;
  }
  .scenario-situation .highlight-problem {
    display: block;
    background: var(--red-bg);
    border-left: 3px solid var(--red);
    padding: 10px 16px;
    margin: 12px 0;
    color: var(--text);
    font-size: 14px;
    line-height: 1.8;
    border-radius: 0 4px 4px 0;
  }

  .scenario-hint {
    font-size: 14px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    line-height: 1.85;
    padding: 14px 18px;
    background: var(--hint-bg);
    border: 1px solid var(--hint-border);
    border-radius: 4px;
    word-break: keep-all;
  }
  .scenario-hint::before {
    content: '💡  학습 포인트';
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 8px;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .scenario-nav {
    padding: 14px 26px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border-light);
    background: var(--bg-deep);
  }
  .scenario-dots {
    display: flex; gap: 8px; margin-right: auto;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border-light);
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.3s;
  }
  .dot.active { background: var(--red); border-color: var(--red); }
  .btn-scenario {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 8px 18px;
    border: 1.5px solid var(--border);
    background: var(--panel);
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.25s;
    border-radius: 2px;
  }
  .btn-scenario:hover {
    border-color: var(--red);
    color: var(--red);
    background: var(--red-bg);
  }

  /* ─── TURN INFO ─── */
  .turn-info {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px;
    color: var(--text-soft);
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 1px;
  }
  .turn-pips { display: flex; gap: 4px; }
  .pip {
    width: 24px; height: 4px;
    background: var(--border-light);
    border-radius: 2px;
    transition: background 0.3s;
  }
  .pip.filled { background: var(--red); }

  /* ─── CHAT AREA ─── */
  .chat-container {
    background: var(--chat-bg);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    min-height: 400px;
    max-height: 480px;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    scroll-behavior: smooth;
    box-shadow: inset 0 2px 12px rgba(139,100,48,0.06);
  }
  .chat-container::-webkit-scrollbar { width: 5px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* 홍도 메시지 */
  .msg-hongdo {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    animation: fadeInUp 0.4s ease;
  }
  .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--bg-deep);
    border: 2.5px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(181,130,30,0.25);
    overflow: hidden;
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    border-radius: 50%;
  }
  .bubble-hongdo {
    background: var(--hongdo-bg);
    border: 1.5px solid var(--hongdo-border);
    border-radius: 4px 16px 16px 16px;
    padding: 16px 20px;
    max-width: calc(100% - 74px);
  }
  .bubble-hongdo .name-tag {
    font-size: 13px;
    color: #3a7a3a;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .bubble-hongdo .text {
    font-size: 16px;
    color: var(--text);
    line-height: 1.9;
    word-break: keep-all;
  }
  .stage-direction {
    display: block;
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-soft);
    font-style: italic;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
  }

  /* 사용자 메시지 */
  .msg-user {
    display: flex;
    justify-content: flex-end;
    animation: fadeInUp 0.3s ease;
  }
  .bubble-user {
    background: var(--user-bg);
    border: 1.5px solid var(--user-border);
    border-radius: 16px 4px 16px 16px;
    padding: 14px 20px;
    max-width: 78%;
  }
  .bubble-user .name-tag {
    font-size: 13px;
    color: var(--red);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-align: right;
  }
  .bubble-user .text {
    font-size: 16px;
    color: var(--text);
    line-height: 1.85;
    word-break: keep-all;
  }

  /* 시스템 메시지 */
  .msg-system {
    text-align: center;
    animation: fadeInUp 0.3s ease;
  }
  .msg-system span {
    font-size: 13px;
    color: var(--text-soft);
    font-family: 'Noto Sans KR', sans-serif;
    padding: 5px 16px;
    border: 1px solid var(--border-light);
    border-radius: 20px;
    background: var(--bg-deep);
    letter-spacing: 0.5px;
  }

  /* 타이핑 인디케이터 */
  .typing-indicator {
    display: flex; gap: 6px; align-items: center;
    padding: 10px 0;
  }
  .typing-dot {
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    animation: typing 1.2s infinite;
    opacity: 0.6;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  /* ─── INPUT ─── */
  .input-section {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .input-label {
    font-size: 13px;
    color: var(--text-soft);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    letter-spacing: 1.5px;
    padding-left: 2px;
  }
  .input-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    color: var(--text);
    resize: none;
    min-height: 64px;
    max-height: 140px;
    line-height: 1.7;
    outline: none;
    transition: border-color 0.3s;
    overflow-y: auto;
  }
  textarea::placeholder { color: var(--text-soft); opacity: 0.6; }
  textarea:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(139,31,48,0.08); }
  .btn-send {
    width: 60px; height: 60px;
    background: var(--red);
    border: none;
    border-radius: 4px;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.25s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 14px rgba(139,31,48,0.3);
  }
  .btn-send:hover { background: #a82840; transform: translateY(-2px); box-shadow: 0 5px 18px rgba(139,31,48,0.4); }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .action-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn-feedback {
    flex: 1;
    min-width: 160px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 14px 24px;
    background: var(--gold);
    border: none;
    color: #fff;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
    border-radius: 4px;
    box-shadow: 0 3px 12px rgba(181,130,30,0.3);
  }
  .btn-feedback:hover { background: #9e6f15; transform: translateY(-1px); }
  .btn-reset {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 14px 22px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.25s;
    border-radius: 4px;
  }
  .btn-reset:hover { border-color: var(--red); color: var(--red); }

  /* ─── FEEDBACK MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,18,8,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
  .modal {
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    width: 100%; max-width: 660px;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(26,18,8,0.3);
    animation: slideUp 0.35s ease;
  }
  .modal-header {
    padding: 22px 28px 18px;
    border-bottom: 1.5px solid var(--border-light);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-deep);
  }
  .modal-header h2 {
    font-size: 18px;
    color: var(--text);
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .modal-header h2 em {
    color: var(--gold);
    font-style: normal;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    margin-left: 10px;
  }
  .btn-close {
    background: none; border: none;
    color: var(--text-soft);
    font-size: 22px; cursor: pointer;
    transition: color 0.2s;
    line-height: 1;
  }
  .btn-close:hover { color: var(--red); }

  .modal-body { padding: 24px 28px; }

  .feedback-loading {
    text-align: center;
    padding: 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .feedback-loading .spin {
    width: 42px; height: 42px;
    border: 3px solid var(--border-light);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .feedback-loading p {
    font-size: 14px;
    color: var(--text-soft);
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 1px;
  }

  .feedback-content { display: flex; flex-direction: column; gap: 16px; }

  .feedback-item {
    background: var(--bg);
    border: 1.5px solid var(--border-light);
    border-radius: 4px;
    overflow: hidden;
  }
  .feedback-item-header {
    padding: 12px 18px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border-light);
    background: var(--bg-deep);
  }
  .feedback-score {
    font-size: 22px;
    font-weight: 700;
    color: var(--red);
    font-family: 'Noto Sans KR', sans-serif;
    min-width: 44px;
  }
  .feedback-label {
    font-size: 15px;
    color: var(--text);
    font-weight: 700;
    letter-spacing: 0.5px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .feedback-tag {
    margin-left: auto;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .tag-good { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
  .tag-mid  { background: #fff8e1; color: #f57f17; border: 1px solid #ffe082; }
  .tag-low  { background: #fce4ec; color: #c62828; border: 1px solid #f48fb1; }

  .feedback-detail {
    padding: 14px 18px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.85;
    font-family: 'Noto Sans KR', sans-serif;
    word-break: keep-all;
  }

  .feedback-overall {
    background: var(--red-bg);
    border: 1.5px solid rgba(139,31,48,0.25);
    border-radius: 4px;
    padding: 18px 20px;
  }
  .feedback-overall h3 {
    font-size: 13px;
    color: var(--red);
    letter-spacing: 2px;
    margin-bottom: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
  }
  .feedback-overall p {
    font-size: 15px;
    color: var(--text);
    line-height: 1.9;
    word-break: keep-all;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .feedback-tip {
    padding: 14px 18px;
    background: var(--gold-bg);
    border-left: 4px solid var(--gold);
    border-radius: 0 4px 4px 0;
  }
  .feedback-tip p {
    font-size: 14px;
    color: var(--text);
    line-height: 1.8;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .feedback-tip strong { color: var(--gold); font-weight: 700; }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes typing {
    0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
    40% { transform: scale(1.1); opacity: 1; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @media (max-width: 560px) {
    .wrapper { padding: 14px 14px 32px; }
    .scenario-body { padding: 16px 18px; }
    .chat-container { min-height: 320px; max-height: 380px; padding: 16px; }
    .header h1 { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="header-badge">Performance Management · 성과관리 역량 시뮬레이션</div>
    <h1>엄홍도와 함께하는<br><em>성과관리 대화법</em></h1>
    <p class="header-sub">목표 설정과 실행 관리 — 팀장의 코칭이 성과를 만듭니다</p>
    <div class="header-divider"></div>
  </div>

  <!-- SCENARIO PANEL -->
  <div class="scenario-panel">
    <div class="scenario-header">
      <span class="icon">📋</span>
      <span>상황 배경</span>
      <span class="competency-tag" id="competencyTag">성과관리 - 목표 설정</span>
    </div>
    <div class="scenario-body">
      <div class="section-label">▪ 배경 상황</div>
      <div class="scenario-situation" id="scenarioText"></div>
      <div class="scenario-hint" id="scenarioHint"></div>
    </div>
    <div class="scenario-nav">
      <div class="scenario-dots">
        <div class="dot active" onclick="selectScenario(0)"></div>
        <div class="dot" onclick="selectScenario(1)"></div>
      </div>
      <button class="btn-scenario" onclick="selectScenario((currentScenario+1)%2)">다음 시나리오 →</button>
    </div>
  </div>

  <!-- TURN + CHAT -->
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding: 0 2px;">
    <div class="turn-info">
      <span>대화 진행</span>
      <div class="turn-pips">
        <div class="pip" id="pip0"></div>
        <div class="pip" id="pip1"></div>
        <div class="pip" id="pip2"></div>
        <div class="pip" id="pip3"></div>
        <div class="pip" id="pip4"></div>
      </div>
    </div>
    <div class="turn-info">팀장 (나) ↔ 엄홍도 (팀원)</div>
  </div>

  <div class="chat-container" id="chatContainer"></div>

  <!-- INPUT -->
  <div class="input-section">

function initChat() {
  const scenario = scenarios[currentScenario];
  conversationHistory = [];
  userTurns = 0;
  updatePips();

  const container = document.getElementById('chatContainer');
  container.innerHTML = '';

  // 퀵버튼 제거됨

  appendSystem('대화가 시작됩니다. 팀장의 한 말씀을 기다립니다...');
  conversationHistory.push({ role: 'assistant', content: scenario.opening });
  appendHongdo(scenario.opening);
}

function selectScenario(idx) {
  currentScenario = idx;
  const s = scenarios[idx];
  document.getElementById('scenarioText').innerHTML = s.situation;
  document.getElementById('scenarioHint').innerHTML = s.hint;
  document.getElementById('competencyTag').textContent = s.tag;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  initChat();
}

// ─── CHAT HELPERS ───
function appendHongdo(text) {
  const container = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = 'msg-hongdo';

  const stageMatch = text.match(/\[([^\]]+)\]$/);
  let mainText = text;
  let stageDir = '';
  if (stageMatch) {
    mainText = text.slice(0, stageMatch.index).trim();
    stageDir = stageMatch[1];

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function updatePips() {
  for (let i = 0; i < 5; i++) {
    document.getElementById('pip' + i).classList.toggle('filled', i < userTurns);
  }
}

// ─── SEND MESSAGE ───
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  if (userTurns >= MAX_TURNS) {
    appendSystem('대화가 충분히 이루어졌습니다. 피드백을 받아보세요!');
    return;
  }

  input.value = '';
  appendUser(text);
  conversationHistory.push({ role: 'user', content: text });
  userTurns++;
  updatePips();

  document.getElementById('sendBtn').disabled = true;
  appendTyping();

  try {
    const response = await fetch('/api/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: buildSystemPrompt(scenarios[currentScenario]),
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || '(홍도가 말문이 막혔습니다...)';

    removeTyping();
    conversationHistory.push({ role: 'assistant', content: reply });
    appendHongdo(reply);

    if (userTurns >= MAX_TURNS) {
      setTimeout(() => appendSystem('5번의 대화가 완료되었습니다. 성과관리 역량 피드백을 받아보세요!'), 500);
    }
  } catch (e) {
    removeTyping();
    appendHongdo('아이고야, 제가 잠깐 정신이 팔렸구먼요... 다시 한번 말씀해 주시겠습니까요? [머쓱하게 웃으며 뒷목을 긁는다]');
  }

  document.getElementById('sendBtn').disabled = false;
}

// ─── FEEDBACK ───
async function openFeedback() {
  if (userTurns === 0) {
    alert('먼저 홍도와 대화를 나눠보세요!');
    return;
  }

  document.getElementById('feedbackModal').classList.add('active');
  document.getElementById('feedbackBody').innerHTML = `
    <div class="feedback-loading">
      <div class="spin"></div>
      <p>대화를 분석하고 있습니다...</p>
    </div>`;

  const scenario = scenarios[currentScenario];
  const dialogText = conversationHistory
    .map(m => `[${m.role === 'user' ? '팀장' : '엄홍도'}] ${m.content}`)
    .join('\n\n');

  const prompt = buildFeedbackPrompt(scenario, dialogText);

  try {
    const response = await fetch('/api/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1200,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content?.[0]?.text || '{}';
    const clean = raw.replace(/```json|```/g, '').trim();
    const fb = JSON.parse(clean);

    const tagClass = t => t === '우수' ? 'tag-good' : t === '보통' ? 'tag-mid' : 'tag-low';
    const r = scenario.rubric;

    document.getElementById('feedbackBody').innerHTML = `
      <div class="feedback-content">
        <div class="feedback-item">
          <div class="feedback-item-header">
            <div class="feedback-score">${fb.d1.score}</div>
            <div class="feedback-label">${r.d1.label}</div>
            <div class="feedback-tag ${tagClass(fb.d1.tag)}">${fb.d1.tag}</div>
          </div>
          <div class="feedback-detail">${fb.d1.comment}</div>
        </div>
        <div class="feedback-item">
          <div class="feedback-item-header">
            <div class="feedback-score">${fb.d2.score}</div>
            <div class="feedback-label">${r.d2.label}</div>
            <div class="feedback-tag ${tagClass(fb.d2.tag)}">${fb.d2.tag}</div>
          </div>
          <div class="feedback-detail">${fb.d2.comment}</div>
        </div>
        <div class="feedback-item">
          <div class="feedback-item-header">
            <div class="feedback-score">${fb.d3.score}</div>
            <div class="feedback-label">${r.d3.label}</div>
            <div class="feedback-tag ${tagClass(fb.d3.tag)}">${fb.d3.tag}</div>
          </div>
          <div class="feedback-detail">${fb.d3.comment}</div>
        </div>
        <div class="feedback-overall">
          <h3>◈ 종합 평가</h3>
          <p>${fb.overall}</p>
        </div>
        <div class="feedback-tip">
          <p><strong>다음 시도해볼 것:</strong> ${fb.tip}</p>
        </div>
      </div>`;
  } catch (e) {
    document.getElementById('feedbackBody').innerHTML = `
      <div style="text-align:center; padding:30px; color:rgba(245,234,214,0.4); font-family:'Noto Sans KR',sans-serif; font-size:13px;">
        분석 중 오류가 발생했습니다.<br>잠시 후 다시 시도해주세요.
      </div>`;
  }
}

function closeModal() {
  document.getElementById('feedbackModal').classList.remove('active');
}

function resetChat() {
  initChat();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function useQuick(btn) {
  document.getElementById('userInput').value = btn.textContent;
  document.getElementById('userInput').focus();
}

selectScenario(0);
