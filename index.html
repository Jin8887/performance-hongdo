<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성과관리 역량 시뮬레이션</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #f0e6d3;
    --bg-deep: #e8d9c0;
    --panel: #faf4e8;
    --border: #c8a87a;
    --border-light: #ddc99a;
    --red: #8b1f30;
    --red-bg: #f5eaec;
    --gold: #b5821e;
    --gold-bg: #fdf6e3;
    --text: #1a1208;
    --text-mid: #3d2e1a;
    --text-soft: #6b5030;
    --hint-bg: #fffbf0;
    --hint-border: #c9a84c;
    --chat-bg: #fdf8f0;
    --user-bg: #f9f0f2;
    --user-border: #d4a0aa;
    --hongdo-bg: #f0f7f0;
    --hongdo-border: #8ab88a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif KR', serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 20%, rgba(200,168,122,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 60% 70% at 85% 80%, rgba(180,140,90,0.15) 0%, transparent 55%),
      var(--bg);
    z-index: 0;
  }

  /* 왼쪽 장식선 */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 6px; height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      #8b1f30 0px, #8b1f30 60px,
      #a83245 60px, #a83245 62px,
      #8b1f30 62px, #8b1f30 120px
    );
    z-index: 1;
  }

  .wrapper {
    position: relative; z-index: 2;
    width: 100%; max-width: 820px;
    padding: 24px 24px 48px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ─── HEADER ─── */
  .header {
    text-align: center;
    padding: 36px 20px 28px;
  }
  .header-badge {
    display: inline-block;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--red);
    border: 1.5px solid var(--red);
    padding: 5px 18px;
    margin-bottom: 18px;
    opacity: 0.85;
  }
  .header h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: -0.5px;
  }
  .header h1 em {
    color: var(--red);
    font-style: normal;
  }
  .header-sub {
    margin-top: 10px;
    font-size: 15px;
    color: var(--text-soft);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .header-divider {
    margin: 20px auto 0;
    width: 140px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  /* ─── SCENARIO PANEL ─── */
  .scenario-panel {
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 0;
    margin-bottom: 20px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(139,31,48,0.1);
  }

  .scenario-header {
    background: var(--red);
    padding: 13px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .scenario-header .icon { font-size: 18px; }
  .scenario-header span {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
  }
  .scenario-header .competency-tag {
    margin-left: auto;
    font-size: 12px;
    background: rgba(255,255,255,0.2);
    color: #fff;
    padding: 3px 12px;
    border: 1px solid rgba(255,255,255,0.4);
    font-weight: 500;
    letter-spacing: 1px;
    border-radius: 2px;
  }

  .scenario-body { padding: 22px 26px 18px; }

  .section-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .scenario-situation {
    font-size: 15px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    line-height: 1.9;
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1.5px dashed var(--border-light);
    word-break: keep-all;
  }
  .scenario-situation strong {
    color: var(--red);
    font-weight: 700;
  }
  .scenario-situation .highlight-problem {
    display: block;
    background: var(--red-bg);
    border-left: 3px solid var(--red);
    padding: 10px 16px;
    margin: 12px 0;
    color: var(--text);
    font-size: 14px;
    line-height: 1.8;
    border-radius: 0 4px 4px 0;
  }

  .scenario-hint {
    font-size: 14px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    line-height: 1.85;
    padding: 14px 18px;
    background: var(--hint-bg);
    border: 1px solid var(--hint-border);
    border-radius: 4px;
    word-break: keep-all;
  }
  .scenario-hint::before {
    content: '💡  학습 포인트';
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 8px;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .scenario-nav {
    padding: 14px 26px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border-light);
    background: var(--bg-deep);
  }
  .scenario-dots {
    display: flex; gap: 8px; margin-right: auto;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border-light);
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.3s;
  }
  .dot.active { background: var(--red); border-color: var(--red); }
  .btn-scenario {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 8px 18px;
    border: 1.5px solid var(--border);
    background: var(--panel);
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.25s;
    border-radius: 2px;
  }
  .btn-scenario:hover {
    border-color: var(--red);
    color: var(--red);
    background: var(--red-bg);
  }

  /* ─── TURN INFO ─── */
  .turn-info {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px;
    color: var(--text-soft);
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 1px;
  }
  .turn-pips { display: flex; gap: 4px; }
  .pip {
    width: 24px; height: 4px;
    background: var(--border-light);
    border-radius: 2px;
    transition: background 0.3s;
  }
  .pip.filled { background: var(--red); }

  /* ─── CHAT AREA ─── */
  .chat-container {
    background: var(--chat-bg);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    min-height: 400px;
    max-height: 480px;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    scroll-behavior: smooth;
    box-shadow: inset 0 2px 12px rgba(139,100,48,0.06);
  }
  .chat-container::-webkit-scrollbar { width: 5px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* 홍도 메시지 */
  .msg-hongdo {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    animation: fadeInUp 0.4s ease;
  }
  .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--bg-deep);
    border: 2.5px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(181,130,30,0.25);
    overflow: hidden;
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    border-radius: 50%;
  }
  .bubble-hongdo {
    background: var(--hongdo-bg);
    border: 1.5px solid var(--hongdo-border);
    border-radius: 4px 16px 16px 16px;
    padding: 16px 20px;
    max-width: calc(100% - 74px);
  }
  .bubble-hongdo .name-tag {
    font-size: 13px;
    color: #3a7a3a;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .bubble-hongdo .text {
    font-size: 16px;
    color: var(--text);
    line-height: 1.9;
    word-break: keep-all;
  }
  .stage-direction {
    display: block;
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-soft);
    font-style: italic;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
  }

  /* 사용자 메시지 */
  .msg-user {
    display: flex;
    justify-content: flex-end;
    animation: fadeInUp 0.3s ease;
  }
  .bubble-user {
    background: var(--user-bg);
    border: 1.5px solid var(--user-border);
    border-radius: 16px 4px 16px 16px;
    padding: 14px 20px;
    max-width: 78%;
  }
  .bubble-user .name-tag {
    font-size: 13px;
    color: var(--red);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-align: right;
  }
  .bubble-user .text {
    font-size: 16px;
    color: var(--text);
    line-height: 1.85;
    word-break: keep-all;
  }

  /* 시스템 메시지 */
  .msg-system {
    text-align: center;
    animation: fadeInUp 0.3s ease;
  }
  .msg-system span {
    font-size: 13px;
    color: var(--text-soft);
    font-family: 'Noto Sans KR', sans-serif;
    padding: 5px 16px;
    border: 1px solid var(--border-light);
    border-radius: 20px;
    background: var(--bg-deep);
    letter-spacing: 0.5px;
  }

  /* 타이핑 인디케이터 */
  .typing-indicator {
    display: flex; gap: 6px; align-items: center;
    padding: 10px 0;
  }
  .typing-dot {
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    animation: typing 1.2s infinite;
    opacity: 0.6;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  /* ─── INPUT ─── */
  .input-section {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .input-label {
    font-size: 13px;
    color: var(--text-soft);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    letter-spacing: 1.5px;
    padding-left: 2px;
  }
  .input-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    color: var(--text);
    resize: none;
    min-height: 64px;
    max-height: 140px;
    line-height: 1.7;
    outline: none;
    transition: border-color 0.3s;
    overflow-y: auto;
  }
  textarea::placeholder { color: var(--text-soft); opacity: 0.6; }
  textarea:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(139,31,48,0.08); }
  .btn-send {
    width: 60px; height: 60px;
    background: var(--red);
    border: none;
    border-radius: 4px;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.25s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 14px rgba(139,31,48,0.3);
  }
  .btn-send:hover { background: #a82840; transform: translateY(-2px); box-shadow: 0 5px 18px rgba(139,31,48,0.4); }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .action-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn-feedback {
    flex: 1;
    min-width: 160px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 14px 24px;
    background: var(--gold);
    border: none;
    color: #fff;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
    border-radius: 4px;
    box-shadow: 0 3px 12px rgba(181,130,30,0.3);
  }
  .btn-feedback:hover { background: #9e6f15; transform: translateY(-1px); }
  .btn-reset {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 14px 22px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.25s;
    border-radius: 4px;
  }
  .btn-reset:hover { border-color: var(--red); color: var(--red); }

  /* ─── FEEDBACK MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,18,8,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
  .modal {
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    width: 100%; max-width: 660px;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(26,18,8,0.3);
    animation: slideUp 0.35s ease;
  }
  .modal-header {
    padding: 22px 28px 18px;
    border-bottom: 1.5px solid var(--border-light);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-deep);
  }
  .modal-header h2 {
    font-size: 18px;
    color: var(--text);
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .modal-header h2 em {
    color: var(--gold);
    font-style: normal;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    margin-left: 10px;
  }
  .btn-close {
    background: none; border: none;
    color: var(--text-soft);
    font-size: 22px; cursor: pointer;
    transition: color 0.2s;
    line-height: 1;
  }
  .btn-close:hover { color: var(--red); }

  .modal-body { padding: 24px 28px; }

  .feedback-loading {
    text-align: center;
    padding: 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .feedback-loading .spin {
    width: 42px; height: 42px;
    border: 3px solid var(--border-light);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .feedback-loading p {
    font-size: 14px;
    color: var(--text-soft);
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 1px;
  }

  .feedback-content { display: flex; flex-direction: column; gap: 16px; }

  .feedback-item {
    background: var(--bg);
    border: 1.5px solid var(--border-light);
    border-radius: 4px;
    overflow: hidden;
  }
  .feedback-item-header {
    padding: 12px 18px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border-light);
    background: var(--bg-deep);
  }
  .feedback-score {
    font-size: 22px;
    font-weight: 700;
    color: var(--red);
    font-family: 'Noto Sans KR', sans-serif;
    min-width: 44px;
  }
  .feedback-label {
    font-size: 15px;
    color: var(--text);
    font-weight: 700;
    letter-spacing: 0.5px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .feedback-tag {
    margin-left: auto;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .tag-good { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
  .tag-mid  { background: #fff8e1; color: #f57f17; border: 1px solid #ffe082; }
  .tag-low  { background: #fce4ec; color: #c62828; border: 1px solid #f48fb1; }

  .feedback-detail {
    padding: 14px 18px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.85;
    font-family: 'Noto Sans KR', sans-serif;
    word-break: keep-all;
  }

  .feedback-overall {
    background: var(--red-bg);
    border: 1.5px solid rgba(139,31,48,0.25);
    border-radius: 4px;
    padding: 18px 20px;
  }
  .feedback-overall h3 {
    font-size: 13px;
    color: var(--red);
    letter-spacing: 2px;
    margin-bottom: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
  }
  .feedback-overall p {
    font-size: 15px;
    color: var(--text);
    line-height: 1.9;
    word-break: keep-all;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .feedback-tip {
    padding: 14px 18px;
    background: var(--gold-bg);
    border-left: 4px solid var(--gold);
    border-radius: 0 4px 4px 0;
  }
  .feedback-tip p {
    font-size: 14px;
    color: var(--text);
    line-height: 1.8;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .feedback-tip strong { color: var(--gold); font-weight: 700; }

  /* ─── DOWNLOAD BUTTONS ─── */
  .download-bar {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1.5px dashed var(--border-light);
  }
  .btn-dl {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 11px 16px;
    border-radius: 4px;
    cursor: pointer;
    border: none;
    transition: all 0.22s;
  }
  .btn-dl-chat {
    background: var(--panel);
    color: var(--text-mid);
    border: 1.5px solid var(--border);
  }
  .btn-dl-chat:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-bg); }
  .btn-dl-feedback {
    background: var(--red);
    color: #fff;
    box-shadow: 0 3px 10px rgba(139,31,48,0.25);
  }
  .btn-dl-feedback:hover { background: #a82840; transform: translateY(-1px); }
  .btn-dl-full {
    background: var(--text-mid);
    color: #fff;
    box-shadow: 0 3px 10px rgba(26,18,8,0.2);
  }
  .btn-dl-full:hover { background: var(--text); transform: translateY(-1px); }

  .btn-dl-img {
    background: #2d6a4f;
    color: #fff;
    box-shadow: 0 3px 10px rgba(45,106,79,0.3);
  }
  .btn-dl-img:hover { background: #1b4332; transform: translateY(-1px); }

  /* 토스트 알림 */
  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fdf8f0;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 11px 24px;
    border-radius: 24px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.25);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 대화 완료 배너 */
  .complete-banner {
    display: none;
    background: linear-gradient(135deg, var(--gold-bg), var(--red-bg));
    border: 1.5px solid var(--gold);
    border-radius: 4px;
    padding: 14px 20px;
    margin-top: 12px;
    text-align: center;
  }
  .complete-banner.visible { display: block; animation: fadeInUp 0.4s ease; }
  .complete-banner p {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--text-mid);
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .complete-banner .banner-btns {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
  }
  .btn-banner {
    font-family: 'Noto Sans KR', sans-serif;

<script>

// ─── SCENARIOS ───
const scenarios = [
  {
    // ── 시나리오 1: 목표 설정 ──
    tag: '성과관리 - 목표 설정',
    competency: '목표 설정',
    situation: `올해 본부는 전략 방향을 전환했습니다.<br>
그간 집중해온 <strong>"운영 효율화"</strong>에서 벗어나,<br>
내년부터는 <strong>"신규 고객 확보와 시장 확대"</strong>를 최우선 과제로 삼기로 했습니다.<br><br>
팀별 내년도 사업계획에는 이 전략 전환을 어떻게 반영할지가 핵심 검토 사항입니다.<br><br>
홍도가 제출한 목표는 다음과 같습니다.<br>
<span class="highlight-problem">팀 매출액 작년 대비 10% 성장 / 고객 민원 건수 연간 10건 이하 유지<br>
→ 작년 목표와 항목은 동일하고, 목표 수치만 일부 높아진 계획입니다.</span>`,
    hint: `홍도의 목표가 틀린 것은 아닙니다. 하지만 조직의 전략 전환이 전혀 반영되지 않았습니다.<br>
홍도를 지적하기보다, 올해와 내년 조직 방향의 차이를 함께 짚으면서<br>
홍도 스스로 연결고리를 찾도록 이끄는 것이 핵심입니다.`,
    opening: `팀장님, 이번 사업계획 제가 공들여 만들었습니다요. 작년에 매출 목표를 아슬아슬하게 맞췄던 게 영 찜찜해서, 올해는 성장 목표도 더 높이 잡고 민원 관리도 더 촘촘하게 넣었습니다. 이 정도면 꽤 탄탄한 계획 아닙니까? [흐뭇하게 문서를 내밀며 칭찬을 기다린다]`,
    quickBtns: [
      '홍도야, 내년에 본부에서 강조하는 방향이 뭔지는 알고 있어?',
      '이 목표가 조직 전체 방향과 어떻게 연결되는 것 같아?',
      '잘 잡았네. 그럼 이걸 어떻게 측정할 생각이야?'
    ],
    rubric: {
      d1: { label: '🎯 전략 연계 유도', desc: '조직의 전략 전환을 홍도 스스로 인식하도록 이끌었는가?' },
      d2: { label: '🔗 연결고리 탐색', desc: '홍도의 기존 목표를 출발점으로 삼아 전략과 연결하도록 질문했는가?' },
      d3: { label: '💬 접근 방식', desc: '홍도를 비난하거나 일방적으로 지시하지 않고 함께 생각하도록 이끌었는가?' }
    }
  },
  {
    // ── 시나리오 2: 실행 및 관리 ──
    tag: '성과관리 - 실행 및 관리',
    competency: '실행 및 관리',
    situation: `홍도의 팀은 올해 중요한 프로젝트를 맡았습니다.<br>
반기 목표 달성률 80% 이상, 월별 진행 보고가 계획에 포함되어 있었습니다.<br><br>
그런데 3분기 점검 결과,<br>
<span class="highlight-problem">목표 달성률이 50%에 머물러 있고, 이미 두 달 전부터 일정이 지연되고 있었던 것으로 드러났습니다.</span><br>
홍도는 매주 월요일 팀원들과 상황을 공유해왔다고 말합니다.<br>
하지만 그 내용이 위로 보고된 적은 없었고, <strong>공식 보고는 이번 분기 점검이 처음</strong>입니다.`,
    hint: `점검은 일정이 아니라 기준입니다.<br>
목표 대비 현재 어디에 있는지, 어떤 상황이 되면 공유해야 하는지 —<br>
<strong>무엇을 어떻게 점검할지</strong>를 함께 정의하지 않으면 문제는 늦게 발견됩니다.<br>
홍도의 점검 노력은 인정하되, 기준 부재의 문제를 홍도 스스로 인식하도록 이끄세요.`,
    opening: `팀장님, 저 팀 관리 소홀히 한 적 없습니다요. 매주 월요일마다 팀원들이랑 빠짐없이 모여서 이번 주 어떻게 돌아가는지 싹 다 확인하고 있었다니까요. 제가 모르고 있었던 게 아니라, 다 파악하고 있었습니다요. [억울하다기보다 자신 있게, 당당한 표정으로 팔짱을 낀다]`,
    quickBtns: [
      '매주 하는 거 알아. 그때 뭘 기준으로 잘 되고 있다고 판단해?',
      '지난 두 달간 일정 지연을 언제쯤 감지하고 있었어?',
      '어느 시점에 나한테 알려주면 같이 풀 수 있을 것 같아?'

    rubric: {
      d1: { label: '✅ 점검 행위 인정', desc: '홍도의 점검 노력을 먼저 인정한 뒤 한계를 짚었는가?' },
      d2: { label: '📊 기준 부재 인식 유도', desc: '무엇을·어떻게 점검해야 하는지 기준 부재를 홍도 스스로 인식하도록 이끌었는가?' },
      d3: { label: '💬 접근 방식', desc: '과거 사례를 구체적으로 환기하며 홍도 스스로 개선안을 제안하도록 이끌었는가?' }

let currentScenario = 0;
let conversationHistory = [];

const MAX_TURNS = 5;

// ─── SYSTEM PROMPT ───
function buildSystemPrompt(scenario) {
  const isS1 = scenario.competency === '목표 설정';
  return `당신은 엄홍도입니다. 영화 '왕이 된 남자'에서 유해진이 연기한 그 캐릭터로, 지금은 팀원으로서 팀장(사용자)과 대화 중입니다.

[캐릭터 핵심]
- 충직하고 인간미 넘치지만 겉으로는 투덜대는 츤데레
- 산전수전 다 겪은 나름의 경험과 자부심이 있는 사람
- 틀린 게 아니라 아쉬운 사람 — 자기 방식에 확신이 있음
- 위기 상황에서 터지는 능청스러운 횡설수설

[현재 상황]
${isS1
  ? `내년도 사업계획 수립 시즌. 홍도는 팀 매출액 10% 성장, 고객 민원 건수 감소 등 팀 내부 기준의 목표를 스스로 준비해왔고, 꽤 공들인 계획이라 자부하고 있음. 그러나 본부의 전략 전환(운영 효율화 → 신규 고객 확보)은 목표에 전혀 반영되지 않음. 홍도의 목표는 기존 고객 매출 유지에 집중되어 있고, 신규 고객 확보 관련 지표는 없음. 홍도는 이 전략 전환을 들어보긴 했지만 자신의 목표와 연결해서 생각해본 적이 없음.`
  : `3분기 점검에서 목표 달성률이 50%에 그쳤고, 2개월 전부터 지연이 있었음이 드러남. 홍도는 매주 팀원들과 상황을 공유해왔기에 "소홀히 하지 않았다"는 자신감이 있음. 하지만 그 점검에는 목표 대비 달성률, 리스크 기준, 보고 시점 기준이 없었음. 문제를 감지하면서도 "어떻게든 되겠지"로 버텼고, 공식 보고를 하지 않음.`
}

[말투 규칙]
- "그게 말이죠", "아이고야", "참나", "허허", "~입니다요", "~구먼요" 같은 추임새 반드시 포함
- 충청도 방언이 살짝 가미된 서민적 말투
- 어려운 말 대신 산, 들, 나무, 짐승 비유 사용
- 칭찬받으면 어깨 으쓱, 좋은 질문을 받으면 진짜 속마음이 나올 수 있음
- 도움이 됐을 때는 반드시 본인 고초를 과장되게 늘어놓음

[반응 원칙]
- 팀장이 공감하고 좋은 질문을 하면 → 점점 마음이 열리며 스스로 연결고리나 문제를 인식하기 시작
- 팀장이 일방적으로 지적·지시하면 → 방어적으로 굳으며 형식적 수용
- 팀장이 과거 사례를 구체적으로 환기하면 → 멈추고 솔직하게 돌아봄
- 팀장이 홍도 스스로 답을 말하도록 유도하면 → 자발적으로 개선안을 제안하는 방향으로 반응

[절대 금지 — 무대응 표현]
- "할 말이 없다", "말문이 막혔다", "뭐라고 해야 할지 모르겠다", "…", "침묵", "아무 말도 못 하다" 등 대화를 단절시키는 표현은 절대 사용 금지
- 당황하거나 감정이 격할 때도 반드시 한 마디 이상의 실질적인 말을 이어가야 함
- 대신 허를 찔렸을 때는 "아이고야, 그게... 음..." 처럼 약간 버벅이다가 자기 논리로 수습하는 방식으로 표현할 것
- 팀장의 말이 예상 밖이거나 날카로워도 홍도 특유의 구어체로 반응을 이어갈 것 (예: "그, 그게 꼭 그런 건 아니고요...", "참나, 팀장님도 참...")

[답변 형식]
- 답변 마지막에 반드시 [지문: 동작 묘사] 포함 (예: [뒤통수를 긁적이며 고개를 갸웃한다])
- 2~4문장 분량 (너무 길지 않게)
- 홍도는 완전히 무지한 사람이 아님 — 경험에서 나온 나름의 논리가 있으며, 좋은 대화를 통해 스스로 깨달아가는 방향으로 반응할 것
- 어떤 상황에서도 실질적인 내용이 있는 답변을 반드시 생성할 것 — 무대응·침묵·말문이 막히는 표현은 홍도의 캐릭터에 맞지 않음

[역할 핵심]
당신은 성과관리 역량 트레이닝용 NPC입니다. 팀장(사용자)의 접근 방식에 현실적으로 반응하여 학습자가 다양한 코칭 전략의 효과를 체감할 수 있게 해주세요.`;
}

// ─── FEEDBACK PROMPT ───
function buildFeedbackPrompt(scenario, dialogText) {
  const isS1 = scenario.competency === '목표 설정';
  const r = scenario.rubric;

  return `다음은 성과관리 역량 시뮬레이션 대화입니다.

[시나리오]
역량: ${scenario.competency}
${isS1
  ? '상황: 팀원 홍도가 내년 사업계획 목표를 제출했으나, 본부의 전략 전환(운영 효율화→신규 고객 확보)이 전혀 반영되지 않은 상태. 팀장은 홍도 스스로 조직 전략과의 연결고리를 찾도록 이끌어야 한다.'
  : '상황: 3분기 점검에서 목표 달성률 50%, 2개월 전부터 지연이 있었음이 드러남. 팀원 홍도는 매주 팀원들과 상황을 공유했다고 주장. 팀장은 홍도의 점검 노력은 인정하되, 기준 없는 점검의 한계를 홍도 스스로 인식하도록 이끌어야 한다.'

}

function updatePips() {
  for (let i = 0; i < 5; i++) {
    document.getElementById('pip' + i).classList.toggle('filled', i < userTurns);

// ─── SEND MESSAGE ───
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  if (userTurns >= MAX_TURNS) {
    appendSystem('대화가 충분히 이루어졌습니다. 피드백을 받아보세요!');
    return;
  }

  input.value = '';
  appendUser(text);
  conversationHistory.push({ role: 'user', content: text });
  userTurns++;
  updatePips();

  document.getElementById('sendBtn').disabled = true;
  appendTyping();

  try {
    const response = await fetch('/api/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: buildSystemPrompt(scenarios[currentScenario]),
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || '그게 말이죠, 팀장님... 음, 잠깐만요. 제 생각을 좀 정리해야겠습니다요. [뒤통수를 긁적이며 시선을 피한다]';

    removeTyping();
    conversationHistory.push({ role: 'assistant', content: reply });
    appendHongdo(reply);

    if (userTurns >= MAX_TURNS) {
      setTimeout(() => {
        appendSystem('5번의 대화가 완료되었습니다. 성과관리 역량 피드백을 받아보세요!');
        document.getElementById('completeBanner').classList.add('visible');
      }, 500);
    }
  } catch (e) {
    removeTyping();
    appendHongdo('아이고야, 제가 잠깐 정신이 팔렸구먼요... 그게 말이죠, 팀장님 말씀이 워낙 찌르는 데가 있어서. 다시 한번 말씀해 주시겠습니까요? [머쓱하게 웃으며 뒷목을 긁는다]');
  }

  document.getElementById('sendBtn').disabled = false;
}

async function openFeedback() {
  if (userTurns === 0) {
    alert('먼저 홍도와 대화를 나눠보세요!');
    return;
  }

  document.getElementById('feedbackModal').classList.add('active');
  document.getElementById('feedbackBody').innerHTML = `
    <div class="feedback-loading">
      <div class="spin"></div>
      <p>대화를 분석하고 있습니다...</p>
    </div>`;

  const scenario = scenarios[currentScenario];
  const dialogText = conversationHistory
    .map(m => `[${m.role === 'user' ? '팀장' : '엄홍도'}] ${m.content}`)
    .join('\n\n');

  const prompt = buildFeedbackPrompt(scenario, dialogText);

  try {
    const response = await fetch('/api/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1200,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content?.[0]?.text || '{}';
    const clean = raw.replace(/```json|```/g, '').trim();
    const fb = JSON.parse(clean);

    lastFeedbackData = fb;   // 피드백 저장
    saveToSheet(fb, dialogText);  // Google Sheets 자동 저장

    const tagClass = t => t === '우수' ? 'tag-good' : t === '보통' ? 'tag-mid' : 'tag-low';
    const r = scenario.rubric;

    document.getElementById('feedbackBody').innerHTML = `
      <div class="feedback-content">
        <div class="feedback-item">
          <div class="feedback-item-header">
            <div class="feedback-score">${fb.d1.score}</div>
            <div class="feedback-label">${r.d1.label}</div>
            <div class="feedback-tag ${tagClass(fb.d1.tag)}">${fb.d1.tag}</div>
          </div>
          <div class="feedback-detail">${fb.d1.comment}</div>
        </div>
        <div class="feedback-item">
          <div class="feedback-item-header">
            <div class="feedback-score">${fb.d2.score}</div>
            <div class="feedback-label">${r.d2.label}</div>
            <div class="feedback-tag ${tagClass(fb.d2.tag)}">${fb.d2.tag}</div>
          </div>
          <div class="feedback-detail">${fb.d2.comment}</div>
        </div>
        <div class="feedback-item">
          <div class="feedback-item-header">
            <div class="feedback-score">${fb.d3.score}</div>
            <div class="feedback-label">${r.d3.label}</div>
            <div class="feedback-tag ${tagClass(fb.d3.tag)}">${fb.d3.tag}</div>
          </div>
          <div class="feedback-detail">${fb.d3.comment}</div>
        </div>

          <h3>◈ 종합 평가</h3>

        </div>
        <div class="feedback-tip">
          <p><strong>다음 시도해볼 것:</strong> ${fb.tip}</p>
        </div>
      </div>`;

    document.getElementById('downloadBar').style.display = 'flex';
  } catch (e) {

}

// ─── DOWNLOAD HELPERS ───
function getTimestamp() {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
}

function triggerDownload(content, filename) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function buildChatText() {
  const scenario = scenarios[currentScenario];
  const ts = new Date().toLocaleString('ko-KR');
  const lines = [
    '══════════════════════════════════════════',
    '  성과관리 역량 시뮬레이션 — 대화 기록',
    '══════════════════════════════════════════',
    `시나리오 : ${scenario.tag}`,
    `저장 일시 : ${ts}`,
    '──────────────────────────────────────────',
    ''
  ];
  conversationHistory.forEach(m => {
    const speaker = m.role === 'user' ? '👤 팀장 (나)' : '🟢 엄홍도 (팀원)';
    lines.push(speaker);
    lines.push(m.content);
    lines.push('');
  });
  lines.push('══════════════════════════════════════════');
  return lines.join('\n');
}

function buildFeedbackText() {
  if (!lastFeedbackData) return null;
  const fb = lastFeedbackData;
  const scenario = scenarios[currentScenario];
  const r = scenario.rubric;
  const ts = new Date().toLocaleString('ko-KR');
  const lines = [
    '══════════════════════════════════════════',
    '  성과관리 역량 시뮬레이션 — 피드백 결과',
    '══════════════════════════════════════════',
    `시나리오 : ${scenario.tag}`,
    `저장 일시 : ${ts}`,
    '',
    '[ 역량 평가 결과 ]',
    '──────────────────────────────────────────',
    `${r.d1.label}`,
    `  점수 : ${fb.d1.score}점  [${fb.d1.tag}]`,
    `  ${fb.d1.comment}`,
    '',
    `${r.d2.label}`,
    `  점수 : ${fb.d2.score}점  [${fb.d2.tag}]`,
    `  ${fb.d2.comment}`,
    '',
    `${r.d3.label}`,
    `  점수 : ${fb.d3.score}점  [${fb.d3.tag}]`,
    `  ${fb.d3.comment}`,
    '',
    '[ 종합 평가 ]',
    '──────────────────────────────────────────',
    fb.overall,
    '',
    '[ 다음에 시도해볼 것 ]',
    '──────────────────────────────────────────',
    fb.tip,
    '',
    '══════════════════════════════════════════'
  ];
  return lines.join('\n');
}

function downloadChat() {
  if (conversationHistory.length === 0) {
    alert('저장할 대화 내용이 없습니다.');
    return;
  }
  triggerDownload(buildChatText(), `홍도_대화기록_${getTimestamp()}.txt`);
}

function downloadFeedback() {
  if (!lastFeedbackData) {
    alert('먼저 피드백을 받아보세요!');
    return;
  }
  triggerDownload(buildFeedbackText(), `홍도_피드백결과_${getTimestamp()}.txt`);
}

function downloadAll() {
  if (conversationHistory.length === 0) {
    alert('저장할 대화 내용이 없습니다.');
    return;
  }
  const chatPart = buildChatText();
  const feedbackPart = lastFeedbackData
    ? '\n\n\n' + buildFeedbackText()
    : '\n\n[ 피드백 없음 — 피드백 받기 후 다시 저장해보세요 ]';
  triggerDownload(chatPart + feedbackPart, `홍도_전체기록_${getTimestamp()}.txt`);
}

// ─── IMAGE SAVE ───
function showToast(msg) {
  let toast = document.getElementById('toastMsg');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toastMsg';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 2800);
}

async function captureAndSave(element, filename, opts = {}) {
  showToast('🖼 이미지 생성 중...');
  try {
    const canvas = await html2canvas(element, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#f0e6d3',
      logging: false,
      ...opts
    });
    const link = document.createElement('a');
    link.download = filename;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('✅ 이미지 저장 완료!');
  } catch (e) {
    showToast('❌ 이미지 저장에 실패했습니다.');
    console.error(e);
  }
}

async function saveChatImage() {
  if (conversationHistory.length === 0) {
    showToast('저장할 대화 내용이 없습니다.');
    return;
  }

  // 채팅 컨테이너를 풀 높이로 캡처하기 위해 임시 클론 생성
  const original = document.getElementById('chatContainer');
  const clone = original.cloneNode(true);
  clone.style.cssText = `
    position: fixed; top: -9999px; left: 50%;
    transform: translateX(-50%);
    width: ${original.offsetWidth}px;
    max-height: none; height: auto;
    overflow: visible;
    background: #fdf8f0;
    padding: 24px;
    border: 1.5px solid #c8a87a;
    border-radius: 4px;
    font-family: 'Noto Serif KR', serif;
  `;

  // 헤더 라벨 삽입
  const scenario = scenarios[currentScenario];
  const label = document.createElement('div');
  label.style.cssText = 'font-family:Noto Sans KR,sans-serif;font-size:12px;font-weight:700;color:#b5821e;letter-spacing:2px;margin-bottom:16px;padding-bottom:12px;border-bottom:1.5px solid #ddc99a;';
  label.textContent = `성과관리 역량 시뮬레이션 · ${scenario.tag}`;
  clone.insertBefore(label, clone.firstChild);

  document.body.appendChild(clone);
  await captureAndSave(clone, `홍도_대화이미지_${getTimestamp()}.png`);
  document.body.removeChild(clone);
}

// ─── GOOGLE SHEETS 저장 ───
async function saveToSheet(fb, dialogText) {
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxwF2rpXNieV0U3A0zq6uK5IobS1L5wp8eLRhpDRC2JZLgB-OLUhv8sqrAoLQgBf7of/exec';
  const scenario = scenarios[currentScenario];
  const now = new Date().toLocaleString('ko-KR');

  const payload = {
    timestamp: now,
    scenario: scenario.tag,
    d1_label: scenario.rubric.d1.label,
    d1_score: fb.d1.score,
    d1_tag: fb.d1.tag,
    d1_comment: fb.d1.comment,
    d2_label: scenario.rubric.d2.label,
    d2_score: fb.d2.score,
    d2_tag: fb.d2.tag,
    d2_comment: fb.d2.comment,
    d3_label: scenario.rubric.d3.label,
    d3_score: fb.d3.score,
    d3_tag: fb.d3.tag,
    d3_comment: fb.d3.comment,
    overall: fb.overall,
    tip: fb.tip,
    dialog: dialogText
  };

  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch (e) {
    console.warn('시트 저장 실패:', e);
  }
}

async function saveFeedbackImage() {
  if (!lastFeedbackData) {
    showToast('먼저 피드백을 받아보세요!');
    return;
  }
  const body = document.getElementById('feedbackBody');
  // 다운로드바 잠깐 숨기고 캡처
  const bar = document.getElementById('downloadBar');
  bar.style.display = 'none';
  await captureAndSave(body, `홍도_피드백이미지_${getTimestamp()}.png`, {
    backgroundColor: '#faf4e8'
  });
  bar.style.display = 'flex';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function useQuick(btn) {
  document.getElementById('userInput').value = btn.textContent;
  document.getElementById('userInput').focus();
}

selectScenario(0);
